name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        working-directory: backend
        run: mypy lyra
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: ESLint + Prettier
        working-directory: frontend
        run: |
          npm run lint
          npm run format

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lyra
          POSTGRES_PASSWORD: lyra
          POSTGRES_DB: lyra
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U lyra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LYRA_DB_HOST: localhost
      LYRA_DB_USER: lyra
      LYRA_DB_PASSWORD: lyra
      LYRA_DB_NAME: lyra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Create test database
        run: PGPASSWORD=lyra psql -h localhost -U lyra -d lyra -c "CREATE DATABASE lyra_test;"
      - name: Pytest
        working-directory: backend
        run: pytest -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Vitest
        working-directory: frontend
        run: npm test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Аудит зависимостей (фаза 7): warning-режим, не гейт — находки
  # разбираются вручную, критичные фиксируются в PR
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: pip-audit (backend)
        continue-on-error: true
        working-directory: backend
        run: |
          pip install -q -e . pip-audit
          pip-audit --skip-editable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend)
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
