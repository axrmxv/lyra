# Установка: pre-commit install && pre-commit install --hook-type commit-msg
# Обход хуков (--no-verify) запрещён — .claude/rules/git.md
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Локальный хук: prettier гоняется с cwd=frontend, чтобы
  # prettier-plugin-tailwindcss (ADR-011) резолвился из frontend/node_modules.
  # Архивный mirrors-prettier и pre-commit language:node запускают prettier из
  # корня репо (noop.js) — plugins резолвятся относительно корня и плагин не
  # находится. Так же prettier запускает CI (npm run format); версия берётся из
  # frontend/package-lock.json — отдельный пин не нужен (единый источник истины).
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'cd frontend && exec ./node_modules/.bin/prettier --write "${@#frontend/}"' prettier
        files: ^frontend/.*\.(ts|tsx|css|json)$
        exclude: package-lock\.json

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
